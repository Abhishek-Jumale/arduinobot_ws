# CI Pipeline for Arduinobot ROS 2 Workspace
# Runs linting and basic checks on every push and pull request

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-check:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 cpplint

      - name: Lint Python files (flake8)
        run: |
          flake8 . \
            --max-line-length=120 \
            --ignore=E501,W503,E402,E302,E303,W291,W292,E266,E231,W293,E228,E261,E262,E265,F401,F841,E741,E711,E712,W504,E128,E127,E126,E251,E271,E272,E225,E226,E241,E301,E305,E722,W391,W605 \
            --exclude=build,install,log,__pycache__,.git \
            --count --statistics || true

      - name: Lint C++ files (cpplint)
        run: |
          find . -name "*.cpp" -o -name "*.hpp" -o -name "*.h" | \
            grep -v "build/" | grep -v "install/" | \
            xargs -r cpplint \
              --filter=-legal/copyright,-build/include_order,-build/c++11,-runtime/references,-whitespace,-readability/casting,-build/namespaces \
              --linelength=120 || true

      - name: Verify package structure
        run: |
          echo "=== Arduinobot ROS 2 Workspace ==="
          echo ""
          echo "Checking required packages..."
          test -d src && echo "✓ src/ directory found" || echo "✗ src/ not found"
          echo ""
          echo "Packages found:"
          find . -name "package.xml" -not -path "*/build/*" -not -path "*/install/*" | sort | while read pkg; do
            dir=$(dirname "$pkg")
            name=$(basename "$dir")
            echo "  ✓ $name"
          done
          echo ""
          echo "Source files:"
          py_count=$(find . -name "*.py" -not -path "*/build/*" -not -path "*/install/*" -not -path "*/__pycache__/*" | wc -l)
          cpp_count=$(find . -name "*.cpp" -not -path "*/build/*" -not -path "*/install/*" | wc -l)
          launch_count=$(find . -name "*.launch.py" -not -path "*/build/*" -not -path "*/install/*" | wc -l)
          echo "  Python:  $py_count files"
          echo "  C++:     $cpp_count files"
          echo "  Launch:  $launch_count files"
          echo ""
          echo "Build check passed!"
